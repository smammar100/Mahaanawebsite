# Azure DevOps — build Next.js app for Linux App Service (Mahaana_Agent pool).
# Library / pipeline variables: SANITY_API_READ_TOKEN, SANITY_IMPORT_TOKEN, SANITY_AUTH_TOKEN (secrets).

trigger:
  branches:
    include:
      - master
      - main

variables:
  directory: "."

pool:
  name: "Mahaana_Agent"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js 20.x"

  - script: |
      npm ci --legacy-peer-deps
    displayName: "npm ci"
    workingDirectory: $(directory)

  - script: |
      npm run build
    displayName: "npm run build"
    workingDirectory: $(directory)
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ctfatnb0
      NEXT_PUBLIC_SANITY_DATASET: production
      SANITY_API_READ_TOKEN: $(SANITY_API_READ_TOKEN)
      SANITY_IMPORT_TOKEN: $(SANITY_IMPORT_TOKEN)
      SANITY_AUTH_TOKEN: $(SANITY_AUTH_TOKEN)

  - task: ArchiveFiles@2
    displayName: "Zip app for Linux App Service"
    inputs:
      rootFolderOrFile: "$(Build.SourcesDirectory)/$(directory)"
      includeRootFolder: false
      archiveType: zip
      archiveFile: "$(Build.ArtifactStagingDirectory)/webapp.zip"
      replaceExistingArchive: true

  - task: CopyFiles@2
    displayName: "Copy package-lock.json"
    inputs:
      sourceFolder: "$(Build.SourcesDirectory)/$(directory)"
      Contents: "package-lock.json"
      TargetFolder: "$(Build.ArtifactStagingDirectory)"
      cleanTargetFolder: false

  - task: PublishBuildArtifacts@1
    displayName: "Publish drop"
    inputs:
      pathtoPublish: "$(Build.ArtifactStagingDirectory)"
      ArtifactName: "drop"
