# Staging release — Terraform for this repo (terraform/stg), then deploy CI artifact drop/webapp.zip.
# Terraform state file name is unique to this app (not shared with other Mahaana repos).

trigger:
  - none

pool:
  name: 'Mahaana_Agent'

variables:
  azureSubscription: 'SP_Mahaana_Dev'
  adoProjectId: '24e8efe7-1703-4a24-9c1b-fe90fe88cd6b'
  buildPipelineId: '274'
  stgWebAppName: 'stg-mahaana-dfa-mahaanaweb'

jobs:
  - job: Deployment
    displayName: Staging — Terraform + deploy Next.js zip
    steps:
      - task: TerraformInstaller@0
        inputs:
          terraformVersion: 'latest'

      - task: TerraformTaskV3@3
        displayName: Terraform init
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)Mahaana WebApp/terraform/stg'
          backendServiceArm: 'SP_Mahaana_Dev'
          backendAzureRmResourceGroupName: 'mahaana-common-stg'
          backendAzureRmStorageAccountName: 'stagingmahaanastatefiles'
          backendAzureRmContainerName: 'mahaana-staging-statefiles'
          backendAzureRmKey: 'mahaana-website-stg.tfstate'

      - task: TerraformTaskV3@3
        displayName: Terraform validate
        inputs:
          provider: 'azurerm'
          command: 'validate'
          workingDirectory: '$(System.DefaultWorkingDirectory)Mahaana WebApp/terraform/stg'

      - task: TerraformTaskV3@3
        displayName: Terraform plan
        inputs:
          provider: 'azurerm'
          command: 'plan'
          workingDirectory: '$(System.DefaultWorkingDirectory)Mahaana WebApp/terraform/stg'
          commandOptions: '-out=tfplan'
          environmentServiceNameAzureRM: 'SP_Mahaana_Dev'

      - task: TerraformTaskV3@3
        displayName: Terraform apply
        inputs:
          provider: 'azurerm'
          command: 'apply'
          workingDirectory: '$(System.DefaultWorkingDirectory)Mahaana WebApp/terraform/stg'
          commandOptions: '-auto-approve tfplan'
          environmentServiceNameAzureRM: 'SP_Mahaana_Dev'

      - task: DownloadBuildArtifacts@1
        displayName: Download build artifact drop
        inputs:
          buildType: 'specific'
          project: '$(adoProjectId)'
          definition: '$(buildPipelineId)'
          buildVersionToDownload: 'latest'
          downloadType: 'single'
          artifactName: 'drop'
          downloadPath: '$(System.ArtifactsDirectory)'

      - task: AzureRmWebAppDeployment@4
        displayName: Deploy webapp.zip to Linux Web App
        inputs:
          ConnectionType: 'AzureRM'
          azureSubscription: '$(azureSubscription)'
          appType: 'webAppLinux'
          WebAppName: '$(stgWebAppName)'
          packageForLinux: '$(System.ArtifactsDirectory)/drop/webapp.zip'
