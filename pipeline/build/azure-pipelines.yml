# CI build — mahaana-website (Next.js 16 + Sanity) in folder Mahaana WebApp.
# NEXT_PUBLIC_* are inlined at `next build` — map below from ADO variables / variable groups.
# SANITY_API_READ_TOKEN, REVALIDATION_SECRET: set on App Service only (runtime), not here.

trigger:
  branches:
    include:
      - master

variables:
  directory: "."

pool:
  name: "Mahaana_Agent"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js 20.x"

  - script: |
      npm install -g pnpm
    displayName: "Install pnpm"

  - script: |
      pnpm install
    displayName: "pnpm install"
    workingDirectory: $(directory)

  - script: |
      pnpm run build
    displayName: "pnpm run build"
    workingDirectory: $(directory)
    env:
      # Required for Sanity + app routes that read these at build time (see src/lib/sanity/client.ts)
      NEXT_PUBLIC_SANITY_PROJECT_ID: ctfatnb0
      NEXT_PUBLIC_SANITY_DATASET: production
      SANITY_API_READ_TOKEN: $(SANITY_API_READ_TOKEN)
      SANITY_IMPORT_TOKEN: $(SANITY_IMPORT_TOKEN)
      SANITY_AUTH_TOKEN: $(SANITY_AUTH_TOKEN)

  - task: ArchiveFiles@2
    displayName: "Zip app for Linux App Service"
    inputs:
      rootFolderOrFile: "$(Build.SourcesDirectory)/$(directory)"
      includeRootFolder: false
      archiveType: zip
      archiveFile: "$(Build.ArtifactStagingDirectory)/webapp.zip"
      replaceExistingArchive: true

  - task: PublishBuildArtifacts@1
    displayName: "Publish drop"
    inputs:
      pathtoPublish: "$(Build.ArtifactStagingDirectory)"
      ArtifactName: "drop"
